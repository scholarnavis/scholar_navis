    <path d="M 512 710 Q 658 770 804 660 L 804 400 Q 658 510 512 450 Z" fill="url(#bookRight)" />
    
    <line x1="512" y1="450" x2="512" y2="710" stroke="#BFDBFE" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
