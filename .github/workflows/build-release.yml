name: Build Scholar Navis (Win & Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf gcc python3-dev build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12.11

      - name: Setup Nuitka Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.os == 'Windows' && '~/.local/share/nuitka' || '~/.cache/nuitka' }}
          key: ${{ runner.os }}-nuitka-${{ hashFiles('**/uv.lock', 'build_app.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Install Dependencies
        run: uv sync

      - name: Build Application and Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          NUITKA_CACHE_DIR: ${{ runner.os == 'Windows' && '~/.local/share/nuitka' || '~/.cache/nuitka' }}
        run: uv run build_app.py